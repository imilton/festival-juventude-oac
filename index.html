<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<!-- Mobile-first viewport: prevent auto-zoom on input fields, respect safe areas -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>38º Aniversário da Juventude - OAC Moçambique</title>
<meta name="description" content="38º Aniversário da Juventude - Igreja Velha Apostólica em Moçambique. Programa de Encerramento das Festividades, 03 de Maio de 2026.">
<!-- Preconnect for faster font loading on mobile networks -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Only load weights actually used — smaller payload on slow connections -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* remove grey flash on tap */
  }

  :root {
    --red:       #C8102E;
    --red-dark:  #9B0C22;
    --white:     #FFFFFF;
    --gold:      #D4AF37;

    /* Fluid type scale — clamp(min, preferred, max)
       Scales smoothly from 320px → 480px screens          */
    --fs-xs:   clamp(0.6rem,  2.5vw, 0.75rem);
    --fs-sm:   clamp(0.7rem,  3vw,   0.85rem);
    --fs-base: clamp(0.75rem, 3.5vw, 1rem);
    --fs-md:   clamp(1rem,    5vw,   1.4rem);
    --fs-lg:   clamp(1.3rem,  6vw,   1.75rem);
    --fs-xl:   clamp(1.6rem,  7.5vw, 2.2rem);
    --fs-hero: clamp(4rem,    18vw,  6rem);

    /* Spacing */
    --sp-xs: clamp(6px,  2vw,  10px);
    --sp-sm: clamp(10px, 3vw,  16px);
    --sp-md: clamp(16px, 5vw,  28px);
    --sp-lg: clamp(28px, 8vw,  48px);

    /* Safe area insets (notch / home bar) */
    --safe-top:    env(safe-area-inset-top,    0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left,   0px);
    --safe-right:  env(safe-area-inset-right,  0px);
  }

  html {
    /* Prevent font size inflation on orientation change */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    font-family: 'Montserrat', system-ui, sans-serif;
    background: #e8e8e8;        /* visible behind the card on large screens */
    min-height: 100dvh;         /* dvh = dynamic viewport height (mobile browsers) */
    overflow-x: hidden;
    /* Card layout: centred on tablet/desktop, full-bleed on mobile */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* The actual page card */
  .page-card {
    width: 100%;
    max-width: 480px;
    background: var(--white);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,0.15);
    /* Honour notch on the sides when rotated */
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
  }

  /* ── HEADER ── */
  .top-bar {
    background: var(--white);
    padding: var(--sp-sm) var(--sp-md);
    /* Respect top notch (iPhone) */
    padding-top: calc(var(--sp-sm) + var(--safe-top));
    display: flex;
    align-items: center;
    gap: var(--sp-sm);
    border-bottom: 1px solid #eee;
    /* Minimum touch target height */
    min-height: 60px;
  }

  .logo-text { line-height: 1.1; color: #111; flex-shrink: 0; }
  .logo-text .the  { font-size: var(--fs-xs); font-weight: 600; display: block; color: #444; }
  .logo-text .oac  { font-size: clamp(1.3rem, 6vw, 1.6rem); font-weight: 900;
                     color: var(--red); line-height: 1; display: block; }
  .logo-text .full { font-size: clamp(0.45rem, 1.8vw, 0.6rem); color: #555;
                     letter-spacing: 0.5px; display: block; white-space: nowrap; }

  .divider-v { width: 1px; height: 36px; background: #ddd; flex-shrink: 0; }

  .church-name {
    font-size: var(--fs-sm);
    font-weight: 600;
    color: #222;
    line-height: 1.35;
    /* Wrap gracefully on very small screens */
    word-break: break-word;
    hyphens: auto;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    background: linear-gradient(160deg, var(--red) 0%, var(--red-dark) 100%);
    padding: var(--sp-lg) var(--sp-md) calc(var(--sp-lg) + 24px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    opacity: 0.12;
    pointer-events: none;
    /* GPU-accelerate the SVG layer */
    will-change: transform;
  }
  .hero-bg svg { width: 100%; height: 100%; }

  /* Torn paper bottom edge */
  .hero::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 100%; height: 48px;
    background: var(--white);
    clip-path: polygon(
      0% 100%, 0% 65%, 3% 42%, 6% 58%, 9% 72%, 12% 52%,
      15% 32%, 18% 55%, 21% 68%, 24% 48%, 27% 30%, 30% 52%,
      33% 65%, 36% 44%, 39% 26%, 42% 48%, 45% 62%, 48% 42%,
      51% 24%, 54% 44%, 57% 60%, 60% 40%, 63% 22%, 66% 42%,
      69% 58%, 72% 36%, 75% 20%, 78% 40%, 81% 55%, 84% 34%,
      87% 16%, 90% 38%, 93% 52%, 96% 32%, 100% 48%, 100% 100%
    );
  }

  /* Anniversary badge — fluid sizing */
  .anniversary-badge {
    display: flex;
    align-items: flex-start;
    gap: clamp(2px, 1vw, 6px);
    animation: fadeDown 0.7s ease both;
    /* Prevent layout shift while font loads */
    min-height: clamp(70px, 20vw, 100px);
  }

  .badge-number {
    font-size: var(--fs-hero);
    font-weight: 900;
    color: var(--white);
    line-height: 0.9;
    letter-spacing: -0.04em;
  }

  .badge-sup-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-top: clamp(8px, 2.5vw, 14px);
  }

  .badge-ordinal {
    font-size: clamp(1rem, 5vw, 1.4rem);
    font-weight: 800;
    color: var(--white);
    line-height: 1;
  }

  .badge-label .aniversario {
    display: block;
    font-size: clamp(0.75rem, 3.8vw, 1.1rem);
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.15em;
    line-height: 1.3;
    text-transform: uppercase;
  }
  .badge-label .da-juventude {
    display: block;
    font-size: clamp(0.6rem, 3vw, 0.85rem);
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── LEMA ── */
  .lema-section {
    padding: var(--sp-lg) var(--sp-md) var(--sp-sm);
    text-align: center;
  }

  .sob-o-lema {
    font-size: var(--fs-xl);
    font-weight: 900;
    color: var(--red);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: var(--sp-sm);
    animation: fadeUp 0.6s 0.2s ease both;
    /* Prevent layout overflow on tiny screens */
    word-break: break-word;
  }

  .lema-text {
    font-family: 'Dancing Script', cursive;
    font-size: var(--fs-lg);
    font-weight: 700;
    color: #222;
    line-height: 1.55;
    margin: 0 auto var(--sp-md);
    animation: fadeUp 0.6s 0.35s ease both;
  }

  /* ── BUILDING ── */
  .building-strip {
    width: 100%;
    /* Fluid height so it looks right on every screen */
    height: clamp(100px, 28vw, 140px);
    position: relative;
    overflow: visible;
    background: #ebebeb;
    flex-shrink: 0;
  }

  .building-strip::before {
    content: '';
    position: absolute;
    top: -1px; left: 0;
    width: 100%; height: 30px;
    background: var(--white);
    clip-path: polygon(
      0% 0%, 4% 58%, 8% 28%, 12% 68%, 16% 18%, 20% 52%, 24% 78%,
      28% 42%, 32% 14%, 36% 48%, 40% 70%, 44% 36%, 48% 8%, 52% 44%,
      56% 66%, 60% 32%, 64% 6%, 68% 40%, 72% 62%, 76% 28%, 80% 6%,
      84% 38%, 88% 62%, 92% 28%, 96% 52%, 100% 18%, 100% 0%
    );
    z-index: 3;
  }

  .building-svg { width: 100%; height: 100%; }

  /* Dove — fluid size, anchored relative to strip */
  .dove-wrap {
    position: absolute;
    right: clamp(12px, 4vw, 24px);
    bottom: clamp(-30px, -8vw, -20px);
    width: clamp(60px, 17vw, 90px);
    z-index: 10;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    /* GPU hint */
    will-change: transform;
  }

  /* ── FOOTER ── */
  .footer-block {
    background: var(--red);
    padding: var(--sp-lg) var(--sp-md);
    /* Respect home-bar at bottom */
    padding-bottom: calc(var(--sp-lg) + var(--safe-bottom));
    text-align: center;
    position: relative;
    margin-top: clamp(30px, 10vw, 50px);
    /* Stretch to fill remaining space on short phones */
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .footer-block::before {
    content: '';
    position: absolute;
    top: -1px; left: 0;
    width: 100%; height: 38px;
    background: var(--white);
    clip-path: polygon(
      0% 0%, 3% 62%, 7% 30%, 11% 70%, 15% 20%, 19% 54%, 23% 80%,
      27% 44%, 31% 14%, 35% 52%, 39% 74%, 43% 40%, 47% 10%, 51% 46%,
      55% 70%, 59% 34%, 63% 8%, 67% 44%, 71% 66%, 75% 32%, 79% 8%,
      83% 42%, 87% 66%, 91% 32%, 95% 56%, 100% 22%, 100% 0%
    );
    z-index: 2;
  }

  .footer-title {
    font-size: var(--fs-xl);
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: var(--sp-xs);
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .footer-subtitle {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: var(--sp-xs);
    animation: fadeUp 0.6s 0.6s ease both;
  }

  .footer-date {
    font-size: var(--fs-sm);
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.06em;
    animation: fadeUp 0.6s 0.7s ease both;
  }

  /* Coming soon badge — minimum tap target 44×44px */
  .coming-soon-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--white);
    color: var(--red);
    font-size: var(--fs-xs);
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px clamp(16px, 5vw, 24px);
    border-radius: 999px;
    margin-top: var(--sp-sm);
    min-height: 44px;          /* WCAG / Apple HIG touch target */
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0)   rotate(-3deg); }
    50%       { transform: translateY(-9px) rotate(3deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1;    transform: scale(1);    }
    50%       { opacity: 0.85; transform: scale(1.04); }
  }

  /* ── RESPECT REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  /* ── LANDSCAPE PHONE: keep readable without scrolling too much ── */
  @media (max-height: 500px) and (orientation: landscape) {
    .hero          { padding-top: var(--sp-md); padding-bottom: var(--sp-lg); }
    .badge-number  { font-size: clamp(2.5rem, 12vw, 4rem); }
    .lema-section  { padding-top: var(--sp-md); }
    .building-strip{ height: 80px; }
    .footer-block  { padding-top: var(--sp-md); }
  }

  /* ── TABLET / DESKTOP: centre the card, show surrounding bg ── */
  @media (min-width: 481px) {
    body { padding: 32px 0; background: #d0d0d0; }
    .page-card { border-radius: 16px; overflow: hidden; min-height: auto; }
  }
</style>
</head>
<body>
<div class="page-card">

<!-- ── HEADER ── -->
<header class="top-bar">
  <div class="logo-text">
    <span class="the">The</span>
    <span class="oac">OAC</span>
    <span class="full">OLD APOSTOLIC CHURCH</span>
  </div>
  <div class="divider-v"></div>
  <p class="church-name">Igreja Velha Apostólica<br>em Moçambique</p>
</header>

<!-- ── HERO ── -->

</section>

<!-- ── LEMA ── -->
<section class="lema-section">
  <h2 class="sob-o-lema">SOB O LEMA</h2>
  <p class="lema-text">
    Formação do Jovem Rumo ao<br>
    Futuro da Igreja Velha Apostólica
  </p>
</section>

<!-- ── BUILDING + DOVE ── -->

  <svg class="building-svg" viewBox="0 0 480 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <rect width="480" height="130" fill="#ebebeb"/>

    <rect x="20"  y="28" width="440" height="102" fill="#C8102E"/>

    <rect x="20"  y="26" width="440" height="8"   fill="#9B0C22"/>

    <rect x="45"  y="48" width="46" height="40" rx="2" fill="white" opacity="0.92"/>
    <rect x="108" y="48" width="46" height="40" rx="2" fill="white" opacity="0.92"/>

</div>

<!-- ── FOOTER ── -->
<footer class="footer-block">
  <p class="footer-title">PROGRAMA</p>
  <p class="footer-subtitle">DE ENCERRAMENTO DAS FESTIVIDADES</p>
  <p class="footer-date">03 de Maio de 2026</p>
  <span class="coming-soon-badge">🕐 Em Breve / Coming Soon</span>
</footer>

</div><!-- /.page-card -->
</body>
</html>
